<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
<!-- Android PWA -->
<meta name="theme-color" content="#5B21B6" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#5B21B6" media="(prefers-color-scheme: dark)"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="Rishan"/>
<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Rishan"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png"/>
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png"/>
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png"/>
<!-- Shared -->
<link rel="manifest" href="manifest.json"/>
<link rel="icon" sizes="192x192" href="icons/icon-192.png"/>
<title>Rishan</title>
<style>
/* ─── RESET ─────────────────────────────────── */
*,*::before,*::after{
  box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  user-select:none;
}
html{height:100%;overflow:hidden;-webkit-text-size-adjust:100%}
body{
  height:100%;overflow:hidden;position:fixed;width:100%;
  font-family:-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  background:#F5F3FF;color:#1C1033;
  overscroll-behavior:none;
}
button,input,select,textarea{font-family:inherit;border:none;outline:none;background:none}
img{display:block;max-width:100%}

/* ─── TOKENS ─────────────────────────────────── */
:root{
  --ink:#1C1033;
  --ink2:#4B4468;
  --ink3:#9490B0;
  --surface:#FFFFFF;
  --bg:#F5F3FF;
  --bg2:#EDE9FF;
  --border:rgba(91,33,182,.10);
  --p:#5B21B6;      /* deep violet */
  --p2:#7C3AED;
  --p3:#A78BFA;
  --pL:#EDE9FF;
  --gp:linear-gradient(135deg,#5B21B6 0%,#7C3AED 100%);
  --red:#EF4444;    --redL:#FEF2F2;
  --amber:#F59E0B;  --amberL:#FFFBEB;
  --green:#10B981;  --greenL:#ECFDF5;
  --sky:#0EA5E9;    --skyL:#F0F9FF;
  --rose:#F43F5E;   --roseL:#FFF1F2;
  --sat:env(safe-area-inset-top,44px);
  --sab:env(safe-area-inset-bottom,34px);
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;--r28:28px;--r32:32px;
  --s1:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --s2:0 4px 16px rgba(91,33,182,.10),0 1px 4px rgba(0,0,0,.06);
  --s3:0 10px 30px rgba(91,33,182,.14),0 2px 8px rgba(0,0,0,.08);
  --sp:0 8px 24px rgba(91,33,182,.32);
}

/* ─── APP SHELL ──────────────────────────────── */
#app{position:fixed;inset:0;display:flex;flex-direction:column}

/* ─── SPLASH ─────────────────────────────────── */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(150deg,#3B0764 0%,#5B21B6 50%,#7C3AED 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s ease,transform .5s ease;
}
#splash.hide{opacity:0;transform:scale(1.04);pointer-events:none}
.splash-app-icon{
  width:100px;height:100px;border-radius:26px;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  font-size:54px;
  border:1.5px solid rgba(255,255,255,.25);
  box-shadow:0 24px 64px rgba(0,0,0,.4);
  animation:splashPop .65s cubic-bezier(.34,1.56,.64,1) .15s both;
}
@keyframes splashPop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
.splash-app-name{
  font-size:30px;font-weight:800;color:#fff;letter-spacing:-.6px;
  margin-top:22px;
  animation:splashUp .5s ease .42s both;
}
.splash-app-sub{
  font-size:14px;color:rgba(255,255,255,.6);font-weight:500;
  margin-top:6px;letter-spacing:.1px;
  animation:splashUp .5s ease .52s both;
}
@keyframes splashUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.splash-dots{
  display:flex;gap:6px;margin-top:48px;
  animation:splashUp .5s ease .7s both;
}
.splash-dot{
  width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);
  animation:dotPulse 1.2s ease-in-out infinite;
}
.splash-dot:nth-child(2){animation-delay:.2s}
.splash-dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ─── STATUS BAR SPACER ──────────────────────── */
#status-bar{flex-shrink:0;height:var(--sat);background:transparent}

/* ─── SCREENS ────────────────────────────────── */
#screens{flex:1;overflow:hidden;position:relative}
.screen{
  position:absolute;inset:0;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transform:translateX(24px);
  transition:opacity .22s ease,transform .22s ease;
  background:var(--bg);
}
.screen.active{opacity:1;pointer-events:all;transform:translateX(0)}
.screen.slide-left{transform:translateX(-24px)}

.screen-body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:16px 16px 32px;
  max-width:700px;margin:0 auto;width:100%;
}
/* no-tab-bar — screens without bottom bar need bottom padding only for safe area */
.screen-body.no-tab{padding-bottom:calc(24px + var(--sab))}

/* sub-screens pushed from right */
.sub-screen{
  position:absolute;inset:0;display:flex;flex-direction:column;
  background:var(--bg);
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  z-index:10;
}
.sub-screen.open{transform:translateX(0)}

/* ─── NAV BAR (top bar for inner screens) ────── */
.nav-bar{
  flex-shrink:0;
  padding:0 16px;
  height:calc(52px);
  background:rgba(245,243,255,.94);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.nav-back{
  width:34px;height:34px;border-radius:50%;
  background:var(--pL);
  display:flex;align-items:center;justify-content:center;
  color:var(--p);font-size:19px;font-weight:500;
  flex-shrink:0;transition:opacity .15s,transform .12s;
}
.nav-back:active{opacity:.6;transform:scale(.9)}
.nav-title{
  flex:1;text-align:center;
  font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.25px;
}
.nav-action{
  width:34px;height:34px;border-radius:50%;
  background:var(--gp);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:20px;font-weight:600;
  box-shadow:var(--sp);
  transition:transform .12s,box-shadow .12s;flex-shrink:0;
}
.nav-action:active{transform:scale(.88);box-shadow:none}
.nav-spacer{width:34px;flex-shrink:0}

/* ─── HOME HEADER ────────────────────────────── */
.home-hdr{
  background:var(--gp);
  border-radius:0 0 var(--r28) var(--r28);
  padding:18px 20px 24px;
  margin:-16px -16px 20px;
  position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(91,33,182,.25);
}
/* subtle mesh overlay */
.home-hdr::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 20%,rgba(255,255,255,.12) 0%,transparent 60%);
}
.home-hdr-row{display:flex;align-items:flex-start;gap:14px;position:relative;z-index:1}
.home-hdr-text{flex:1;min-width:0}
.hdr-greeting{font-size:12px;color:rgba(255,255,255,.65);font-weight:500;letter-spacing:.2px}
.hdr-name{
  font-size:22px;font-weight:800;color:#fff;
  letter-spacing:-.5px;line-height:1.1;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hdr-meta{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.hdr-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;
  background:rgba(255,255,255,.18);
  font-size:11px;font-weight:700;color:#fff;letter-spacing:.2px;
}
.hdr-avatar{
  width:48px;height:48px;border-radius:50%;
  border:2px solid rgba(255,255,255,.45);
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;overflow:hidden;flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  cursor:pointer;transition:transform .12s;
}
.hdr-avatar:active{transform:scale(.9)}
.hdr-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ─── SECTION LABEL ──────────────────────────── */
.sec-lbl{
  font-size:11px;font-weight:700;color:var(--p);
  text-transform:uppercase;letter-spacing:1.1px;
  margin-bottom:10px;
}

/* ─── MENU GRID ──────────────────────────────── */
.menu-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;margin-bottom:20px;
}
.menu-tile{
  background:var(--surface);
  border-radius:var(--r20);
  padding:16px 10px 14px;
  display:flex;flex-direction:column;align-items:center;
  gap:6px;box-shadow:var(--s2);
  transition:transform .16s cubic-bezier(.34,1.3,.64,1),box-shadow .16s;
  position:relative;overflow:hidden;cursor:pointer;
  border:1px solid var(--border);
}
.menu-tile::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
  border-radius:var(--r20) var(--r20) 0 0;
}
.menu-tile:active{transform:scale(.93);box-shadow:var(--s1)}
.mt-icon{font-size:26px;line-height:1}
.mt-label{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.1px}
.mt-badge{
  position:absolute;top:8px;right:8px;
  min-width:17px;height:17px;padding:0 4px;
  border-radius:9px;font-size:9px;font-weight:800;
  background:var(--red);color:#fff;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
  box-shadow:0 2px 6px rgba(239,68,68,.4);
}
.mt-badge.show{opacity:1}
/* colour accent bars */
.mt1::before{background:var(--gp)}
.mt2::before{background:linear-gradient(90deg,#F59E0B,#FBBF24)}
.mt3::before{background:linear-gradient(90deg,#EF4444,#F87171)}
.mt4::before{background:linear-gradient(90deg,#10B981,#34D399)}
.mt5::before{background:linear-gradient(90deg,#8B5CF6,#A78BFA)}
.mt6::before{background:linear-gradient(90deg,#0EA5E9,#38BDF8)}

/* ─── TODAY CARD ─────────────────────────────── */
.today-card{
  background:var(--surface);border-radius:var(--r20);
  overflow:hidden;box-shadow:var(--s2);
  border:1px solid var(--border);margin-bottom:4px;
}
.today-card-hdr{
  padding:13px 16px;
  background:linear-gradient(90deg,var(--greenL),rgba(236,253,245,0));
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.today-card-hdr-title{font-size:13px;font-weight:700;color:#065F46}
.today-more-btn{font-size:12px;font-weight:600;color:var(--p)}
.today-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-bottom:.5px solid var(--bg2);
}
.today-row:last-child{border-bottom:none}
.tr-num{
  width:22px;height:22px;border-radius:7px;
  background:var(--pL);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:var(--p);flex-shrink:0;
}
.tr-time{font-size:11px;color:var(--ink3);font-weight:600;min-width:58px;flex-shrink:0}
.tr-sub{font-size:14px;font-weight:700;color:var(--ink);flex:1}
.tr-icon{font-size:17px}

/* ─── QUOTE CARD ─────────────────────────────── */
.quote-card{
  background:var(--surface);border-radius:var(--r16);
  padding:14px 16px;margin-bottom:20px;
  box-shadow:var(--s1);
  border-left:3px solid var(--p);
  display:flex;align-items:flex-start;gap:10px;
}
.qc-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.qc-text{font-size:13px;font-weight:500;color:var(--ink2);line-height:1.55;font-style:italic}

/* ─── SECTION HDR ────────────────────────────── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.2px}
.sec-link{font-size:13px;font-weight:600;color:var(--p)}

/* ═══════════════════════════════════════════════
   TIMETABLE — fixed-height grid, no scroll
═══════════════════════════════════════════════ */
#s-tt .screen-body{
  display:flex;flex-direction:column;
  overflow:hidden;padding-bottom:0;
}

/* day selector row */
.day-row{
  display:flex;gap:6px;flex-shrink:0;
  padding:12px 16px 10px;
  overflow-x:auto;scrollbar-width:none;
  background:var(--surface);
  border-bottom:.5px solid var(--border);
}
.day-row::-webkit-scrollbar{display:none}
.day-btn{
  flex-shrink:0;padding:8px 18px;border-radius:20px;
  font-size:13px;font-weight:700;color:var(--ink3);
  background:var(--bg2);
  transition:all .22s cubic-bezier(.34,1.2,.64,1);
  letter-spacing:.1px;
}
.day-btn:active{transform:scale(.94)}
.day-btn.on{
  background:var(--gp);color:#fff;
  box-shadow:0 4px 14px rgba(91,33,182,.38);
  transform:scale(1.04);
}
.day-btn.today-ring{box-shadow:0 0 0 2px var(--rose),0 2px 6px rgba(0,0,0,.06)}
.day-btn.on.today-ring{box-shadow:0 4px 14px rgba(91,33,182,.38)}

/* 2×4 grid — fills available height */
.tt-grid-wrap{
  flex:1;overflow:hidden;
  padding:12px 16px;
}
.tt-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:repeat(4,1fr);
  gap:10px;
  height:100%;
}

/* timetable card */
.tt-card{
  border-radius:var(--r20);overflow:hidden;
  box-shadow:var(--s3);position:relative;
  display:flex;flex-direction:column;
  transition:transform .16s cubic-bezier(.34,1.2,.64,1);
  cursor:default;
  animation:ttIn .35s cubic-bezier(.34,1.1,.64,1) both;
}
@keyframes ttIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
/* stagger */
.tt-card:nth-child(1){animation-delay:.03s}
.tt-card:nth-child(2){animation-delay:.07s}
.tt-card:nth-child(3){animation-delay:.11s}
.tt-card:nth-child(4){animation-delay:.15s}
.tt-card:nth-child(5){animation-delay:.19s}
.tt-card:nth-child(6){animation-delay:.23s}
.tt-card:nth-child(7){animation-delay:.27s}
.tt-card:nth-child(8){animation-delay:.31s}

.tt-card-inner{
  flex:1;padding:12px 13px;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;
}
/* soft shine overlay */
.tt-card-inner::before{
  content:'';position:absolute;
  top:-30%;left:-20%;width:100%;height:70%;
  background:rgba(255,255,255,.12);
  border-radius:50%;transform:rotate(-15deg);
  pointer-events:none;
}
.tt-period-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:8px;
  background:rgba(255,255,255,.22);
  font-size:12px;font-weight:800;color:#fff;
  border:1.5px solid rgba(255,255,255,.3);
  margin-bottom:6px;flex-shrink:0;
}
.tt-subject{
  font-size:13.5px;font-weight:800;color:#fff;
  letter-spacing:-.2px;line-height:1.25;
  text-shadow:0 1px 3px rgba(0,0,0,.15);
}
.tt-time{
  font-size:10.5px;color:rgba(255,255,255,.8);
  font-weight:600;margin-top:4px;
}
.tt-icon{
  position:absolute;right:10px;bottom:10px;
  font-size:26px;opacity:.85;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));
}
/* edit/del appear on long-press or always visible small */
.tt-edit-bar{
  display:flex;gap:4px;padding:5px 10px;
  background:rgba(0,0,0,.18);
  justify-content:flex-end;flex-shrink:0;
}
.tt-eb-btn{
  width:24px;height:24px;border-radius:6px;
  background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;transition:background .12s;
}
.tt-eb-btn:active{background:rgba(255,255,255,.35);transform:scale(.88)}

/* gradient palette for timetable cards */
.g0{background:linear-gradient(145deg,#667EEA,#764BA2)}
.g1{background:linear-gradient(145deg,#F093FB,#F5576C)}
.g2{background:linear-gradient(145deg,#4FACFE,#00F2FE)}
.g3{background:linear-gradient(145deg,#43E97B,#38F9D7)}
.g4{background:linear-gradient(145deg,#FA709A,#FEE140)}
.g5{background:linear-gradient(145deg,#A18CD1,#FBC2EB)}
.g6{background:linear-gradient(145deg,#FCCB90,#D57EEB)}
.g7{background:linear-gradient(145deg,#89F7FE,#66A6FF)}

/* ─── GRADES ─────────────────────────────────── */
.grade-summary{
  background:var(--gp);
  border-radius:var(--r24);padding:20px;
  margin-bottom:14px;box-shadow:var(--sp);
  display:flex;align-items:center;gap:16px;
}
.gs-left{flex:1}
.gs-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.65);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.gs-grade{font-size:46px;font-weight:900;color:#fff;line-height:1;letter-spacing:-2px}
.gs-avg{font-size:13px;color:rgba(255,255,255,.7);margin-top:5px;font-weight:600}
.gs-ring{
  width:70px;height:70px;border-radius:50%;flex-shrink:0;
  border:3px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:900;color:#fff;
}
.grade-list{
  background:var(--surface);border-radius:var(--r20);
  overflow:hidden;box-shadow:var(--s2);border:1px solid var(--border);
}
.grade-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;border-bottom:.5px solid var(--bg2);
}
.grade-row:last-child{border-bottom:none}
.gr-icon{
  width:42px;height:42px;border-radius:var(--r12);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.gr-info{flex:1;min-width:0}
.gr-name{font-size:14px;font-weight:700;color:var(--ink)}
.gr-score{font-size:11px;color:var(--ink3);margin-top:2px;font-weight:600}
.gr-bar{margin-top:6px;height:5px;background:var(--bg2);border-radius:4px;overflow:hidden}
.gr-fill{height:100%;border-radius:4px;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.gr-letter{font-size:20px;font-weight:900;flex-shrink:0;min-width:30px;text-align:center}
.gr-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.act-sm{
  width:27px;height:27px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:all .12s;
}
.act-sm:active{transform:scale(.84)}
.a-edit{background:var(--pL);color:var(--p)}
.a-del{background:var(--roseL);color:var(--red)}

/* ─── HOMEWORK ───────────────────────────────── */
.filter-row{
  display:flex;gap:7px;overflow-x:auto;padding:0 0 10px;scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none}
.f-chip{
  flex-shrink:0;padding:8px 16px;border-radius:20px;
  font-size:12px;font-weight:700;color:var(--ink3);
  background:var(--surface);box-shadow:var(--s1);
  border:.5px solid var(--border);transition:all .18s;
}
.f-chip.on{background:var(--gp);color:#fff;box-shadow:0 4px 12px rgba(91,33,182,.3);border-color:transparent}

.hw-card{
  background:var(--surface);border-radius:var(--r16);
  margin-bottom:9px;overflow:hidden;
  box-shadow:var(--s2);border:1px solid var(--border);
}
.hw-top-bar{height:3px}
.hw-body{padding:14px 16px}
.hw-head{display:flex;align-items:flex-start;gap:10px}
.hw-subj{font-size:15px;font-weight:700;color:var(--ink);flex:1}
.hw-pill{
  padding:4px 9px;border-radius:20px;
  font-size:10px;font-weight:700;flex-shrink:0;
}
.hw-desc{font-size:13px;color:var(--ink2);margin-top:6px;line-height:1.5}

  border:none;font-family:inherit;transition:opacity .15s;

.hw-next:active{opacity:.7}
.hw-del{

  padding:5px 10px;border-radius:12px;cursor:pointer;

  background:var(--surface);border-radius:var(--r16);

  font-size:12px;margin-top:1px;transition:all .18s;cursor:pointer;
  background:var(--bg2);
}
.todo-chk.done{

}
.todo-info{flex:1;min-width:0}
.todo-name{font-size:14px;font-weight:700;color:var(--ink)}

.todo-dead{

  margin-top:7px;padding:3px 9px;border-radius:9px;
  background:var(--pL);font-size:11px;font-weight:600;color:var(--p);

.todo-del{font-size:16px;color:var(--bg2);cursor:pointer;padding:2px;flex-shrink:0}

.pb-pic-wrap{

}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ─── SHEETS ─────────────────────────────────── */
.sheet-overlay{
  position:fixed;inset:0;z-index:200;

  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:none;align-items:flex-end;justify-content:center;
}
.sheet-overlay.open{display:flex;animation:ovIn .2s ease}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.sheet{
  background:var(--surface);width:100%;max-width:580px;
  border-radius:var(--r28) var(--r28) 0 0;
  padding:0 20px calc(24px + var(--sab));
  max-height:90dvh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  animation:sheetUp .3s cubic-bezier(.34,1.05,.64,1);
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{
  width:34px;height:4px;background:var(--bg2);
  border-radius:4px;margin:14px auto 18px;
}
.sheet-title{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:18px;letter-spacing:-.3px}

/* ─── BUTTONS ────────────────────────────────── */
.btn{

}
.btn:active{transform:scale(.96);opacity:.88}
.btn-primary{background:var(--gp);color:#fff;box-shadow:var(--sp)}
.btn-ghost{background:var(--pL);color:var(--p)}
.btn-row{display:flex;gap:10px;margin-top:18px}

/* ─── TOAST ──────────────────────────────────── */
#toast{
  position:fixed;bottom:28px;left:50%;

  background:rgba(28,16,51,.92);color:#fff;
  padding:11px 22px;border-radius:40px;

}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty-box{text-align:center;padding:48px 20px}
.empty-box .ei{font-size:52px;margin-bottom:14px;display:block;

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

const GBADGE_GRADS=['g0','g1','g2','g3','g4'];
function gradeInfo(score,max){
  const pct=Math.round(score/max*100);
  if(pct>=90)return{l:'A+',c:'#10B981',fill:'#10B981'};
  if(pct>=80)return{l:'A', c:'#0A84FF',fill:'#0A84FF'};
  if(pct>=70)return{l:'B+',c:'#0EA5E9',fill:'#0EA5E9'};
  if(pct>=60)return{l:'B', c:'#F59E0B',fill:'#F59E0B'};
  if(pct>=50)return{l:'C', c:'#F97316',fill:'#F97316'};
  return{l:'D',c:'#EF4444',fill:'#EF4444'};
}
function renderGrades(){
  const grades=DB.get('grades')||[];
  const el=document.getElementById('grades-body');
  if(!grades.length){
    el.innerHTML='<div class="empty-box"><span class="ei">📊</span><p>No subjects yet. Tap + to add.</p></div>';return;
  }
  const avg=grades.reduce((a,g)=>a+g.score/g.max*100,0)/grades.length;
  const gi=gradeInfo(avg,100);
  el.innerHTML=`
    <div class="grade-summary" style="margin-bottom:14px">
      <div class="gs-left">
        <div class="gs-label">Overall Performance</div>
        <div class="gs-grade">${gi.l}</div>
        <div class="gs-avg">${Math.round(avg)}% · ${grades.length} subjects</div>
      </div>
      <div class="gs-ring">${gi.l}</div>
    </div>
    <div class="grade-list">
      ${grades.map((g,i)=>{
        const pct=Math.round(g.score/g.max*100);
        const info=gradeInfo(g.score,g.max);
        const subj=g.s||g.subject;
        return`<div class="grade-row">
          <div class="gr-icon ${GBADGE_GRADS[i%GBADGE_GRADS.length]}" style="border-radius:12px">${ICONS[subj]||'📚'}</div>
          <div class="gr-info">
            <div class="gr-name">${subj}</div>
            <div class="gr-score">${g.score}/${g.max} · ${pct}%</div>
            <div class="gr-bar"><div class="gr-fill" style="width:0%;background:${info.fill}" data-w="${pct}"></div></div>
          </div>
          <div class="gr-letter" style="color:${info.c}">${info.l}</div>
          <div class="gr-actions">
            <button class="act-sm a-edit" onclick="openGradeSheet(${i})">✏️</button>
            <button class="act-sm a-del"  onclick="delGrade(${i})">🗑</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      document.querySelectorAll('.gr-fill').forEach(b=>{b.style.width=b.dataset.w+'%'});
    },100);
  });
}
function openGradeSheet(idx){
  document.getElementById('sg-idx').value=idx;
  if(idx>=0){
    const g=(DB.get('grades')||[])[idx];
    document.getElementById('sh-grade-title').textContent='Edit Subject';
    document.getElementById('sg-sub').value=g.s||g.subject;
    document.getElementById('sg-score').value=g.score;
    document.getElementById('sg-max').value=g.max;
  } else {
    document.getElementById('sh-grade-title').textContent='Add Subject';
    document.getElementById('sg-sub').value='';
    document.getElementById('sg-score').value='';
    document.getElementById('sg-max').value='100';
  }
  openSheet('sh-grade');
}
function saveGrade(){
  const subj=document.getElementById('sg-sub').value.trim();
  if(!subj){toast('⚠️ Enter subject');return;}
  const score=parseFloat(document.getElementById('sg-score').value)||0;
  const max=parseFloat(document.getElementById('sg-max').value)||100;
  const grades=DB.get('grades')||[];
  const idx=parseInt(document.getElementById('sg-idx').value);
  const entry={s:subj,score,max};
  if(idx>=0)grades[idx]=entry;else grades.push(entry);
  DB.set('grades',grades);
  closeSheet('sh-grade');renderGrades();badge('qb-g',grades.length);
  toast('✅ Grade saved!');
}
function delGrade(i){
  if(!confirm('Delete subject?'))return;
  const grades=DB.get('grades')||[];
  grades.splice(i,1);DB.set('grades',grades);renderGrades();
  badge('qb-g',grades.length);

}

  todos.unshift({name,desc:document.getElementById('mt-desc').value.trim(),
    dead:document.getElementById('mt-dead').value,done:false});
  DB.set('todos',todos);
  closeSheet('sh-todo');renderTodo();updateTodoBadge();toast('✅ Task added!');
}
function setTodoF(f,btn){
  todoFilter=f;
  document.querySelectorAll('#s-todo .f-chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');renderTodo();
}
function updateTodoBadge(){
  const n=(DB.get('todos')||[]).filter(t=>!t.done).length;
  badge('qb-td',n);
}

/* ════════════════════════════════════════════════
   SHEETS
════════════════════════════════════════════════ */
function openSheet(id){document.getElementById(id).classList.add('open')}
function closeSheet(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.sheet-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open')});
});

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);
}

/* ════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════ */
function todayISO(){return new Date().toISOString().split('T')[0]}
function fmtDate(d){
  if(!d)return'';
  try{return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
  catch{return d}
}

   SERVICE WORKER
════════════════════════════════════════════════ */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(r=>{r.update();})
      .catch(()=>{});
  });
}

   INIT
════════════════════════════════════════════════ */
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>document.getElementById('splash').remove(),500);
  }, 1800);
  renderHome();
});
</script>
