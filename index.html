<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#6C35DE"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Rishan"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="apple-touch-startup-image" href="icons/icon-512.png"/>
<title>Rishan</title>
<style>
/* ═══════════════════════════════════════════
   NATIVE APP FOUNDATION
═══════════════════════════════════════════ */
*,*::before,*::after{
  box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  user-select:none;
}
html{
  height:100%;overflow:hidden;
  -webkit-text-size-adjust:100%;
}
body{
  height:100%;overflow:hidden;
  font-family:-apple-system,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
  background:#0F0A1E;
  color:#1A1040;
  position:fixed;width:100%;
  /* Prevent rubber-band scrolling on iOS */
  overscroll-behavior:none;
}
button,input,select,textarea{font-family:inherit;border:none;outline:none;background:none;}
img{display:block;max-width:100%}

/* ═══════════════════════════════════════════
   CSS VARIABLES
═══════════════════════════════════════════ */
:root{
  /* Brand */
  --p1:#6C35DE; --p2:#9B59F5;
  /* Vivid palette */
  --c1:#FF3B5C; --c2:#FF9500; --c3:#FFD60A;
  --c4:#34C759; --c5:#00C7BE; --c6:#0A84FF;
  --c7:#BF5AF2; --c8:#FF6B6B; --c9:#FF9F0A;
  --c10:#30D158;
  /* Grads */
  --gP:linear-gradient(145deg,#6C35DE,#9B59F5);
  --g1:linear-gradient(145deg,#FF3B5C,#FF6B9D);
  --g2:linear-gradient(145deg,#FF9500,#FFD60A);
  --g3:linear-gradient(145deg,#34C759,#00C7BE);
  --g4:linear-gradient(145deg,#0A84FF,#5AC8FA);
  --g5:linear-gradient(145deg,#BF5AF2,#FF375F);
  --g6:linear-gradient(145deg,#FF6B6B,#FF9F0A);
  --gtt0:linear-gradient(135deg,#667eea,#764ba2);
  --gtt1:linear-gradient(135deg,#f093fb,#f5576c);
  --gtt2:linear-gradient(135deg,#4facfe,#00f2fe);
  --gtt3:linear-gradient(135deg,#43e97b,#38f9d7);
  --gtt4:linear-gradient(135deg,#fa709a,#fee140);
  --gtt5:linear-gradient(135deg,#a18cd1,#fbc2eb);
  --gtt6:linear-gradient(135deg,#fccb90,#d57eeb);
  --gtt7:linear-gradient(135deg,#e0c3fc,#8ec5fc);
  /* Safe areas */
  --sat:env(safe-area-inset-top,44px);
  --sab:env(safe-area-inset-bottom,34px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
  /* Tab bar height */
  --tab:56px;
  --tabH:calc(var(--tab) + var(--sab));
}

/* ═══════════════════════════════════════════
   APP SHELL — fills the whole screen
═══════════════════════════════════════════ */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:#F2F0FF;
}

/* ═══════════════════════════════════════════
   SPLASH SCREEN
═══════════════════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg,#6C35DE 0%,#FF3B5C 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;transition:opacity .5s ease,transform .5s ease;
}
#splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.splash-icon{
  width:96px;height:96px;border-radius:28px;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:52px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  animation:splashPop .6s cubic-bezier(.34,1.56,.64,1) .1s both;
}
@keyframes splashPop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.splash-name{
  font-size:28px;font-weight:800;color:#fff;
  margin-top:20px;letter-spacing:-.5px;
  animation:splashFade .5s ease .4s both;
}
.splash-sub{
  font-size:14px;color:rgba(255,255,255,.7);
  margin-top:6px;font-weight:500;
  animation:splashFade .5s ease .5s both;
}
@keyframes splashFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════
   STATUS BAR SPACER (iOS notch)
═══════════════════════════════════════════ */
#status-bar{
  flex-shrink:0;
  height:var(--sat);
  background:transparent;
}

/* ═══════════════════════════════════════════
   SCREENS CONTAINER
═══════════════════════════════════════════ */
#screens{
  flex:1;overflow:hidden;position:relative;
}
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transform:translateX(30px);
  transition:opacity .25s ease,transform .25s ease;
  background:#F2F0FF;
}
.screen.active{
  opacity:1;pointer-events:all;
  transform:translateX(0);
}
.screen.slide-left{transform:translateX(-30px)}

/* Scrollable body within screen */
.screen-body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:12px 16px calc(16px + var(--tabH));
  max-width:640px;margin:0 auto;width:100%;
}
/* Sub-screens (pushed from main screens) */
.sub-screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  background:#F2F0FF;
  transform:translateX(100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  z-index:10;
}
.sub-screen.open{transform:translateX(0)}

/* ═══════════════════════════════════════════
   NATIVE NAVIGATION BAR
═══════════════════════════════════════════ */
.nav-bar{
  flex-shrink:0;padding:12px 20px 14px;
  background:rgba(242,240,255,.92);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:0.5px solid rgba(0,0,0,.1);
}
.nav-bar-inner{display:flex;align-items:center;gap:10px;min-height:44px}
.nav-back{
  width:36px;height:36px;border-radius:50%;
  background:rgba(108,53,222,.12);
  display:flex;align-items:center;justify-content:center;
  color:var(--p1);font-size:18px;font-weight:600;
  flex-shrink:0;transition:background .15s,transform .1s;
}
.nav-back:active{background:rgba(108,53,222,.22);transform:scale(.9)}
.nav-bar-center{flex:1;text-align:center}
.nav-bar-title{font-size:17px;font-weight:700;color:#1A1040;letter-spacing:-.2px}
.nav-bar-right{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nav-action{
  width:36px;height:36px;border-radius:50%;
  background:var(--gP);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:18px;font-weight:700;
  box-shadow:0 4px 12px rgba(108,53,222,.4);
  transition:transform .15s;
}
.nav-action:active{transform:scale(.88)}

/* ═══════════════════════════════════════════
   TAB BAR — iOS-style
═══════════════════════════════════════════ */
#tab-bar{
  flex-shrink:0;
  height:var(--tabH);
  padding-bottom:var(--sab);
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-top:0.5px solid rgba(0,0,0,.12);
  display:flex;align-items:flex-start;
  padding-top:6px;
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:2px 4px;
  color:#8E8EA9;font-size:10px;font-weight:600;
  letter-spacing:.2px;transition:color .15s;
  position:relative;cursor:pointer;
}
.tab-item .tab-icon{
  font-size:24px;line-height:1;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
  display:block;
}
.tab-item .tab-label{
  font-size:10px;font-weight:600;letter-spacing:.1px;
  transition:color .15s;
}
.tab-item.on{ color:var(--p1); }
.tab-item.on .tab-icon{ transform:scale(1.2) translateY(-2px); }
.tab-badge{
  position:absolute;top:0;left:calc(50% + 6px);
  min-width:16px;height:16px;padding:0 4px;
  background:var(--c1);border-radius:8px;border:2px solid #fff;
  font-size:9px;font-weight:800;color:#fff;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.tab-badge.show{opacity:1}

/* ═══════════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════════ */
.home-header{
  background:linear-gradient(135deg,#6C35DE 0%,#FF3B5C 100%);
  border-radius:0 0 28px 28px;
  padding:20px 20px 28px;
  margin:-12px -16px 16px;
  position:relative;overflow:hidden;
}
.home-header::before{
  content:'';position:absolute;
  right:-30px;top:-30px;
  width:140px;height:140px;border-radius:50%;
  background:rgba(255,255,255,.08);
}
.home-header::after{
  content:'';position:absolute;
  left:-20px;bottom:-40px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.home-hdr-row{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.home-hdr-left{flex:1;min-width:0}
.home-greeting{font-size:13px;color:rgba(255,255,255,.75);font-weight:500}
.home-name{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.home-grade-tag{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:6px;padding:4px 12px;
  background:rgba(255,255,255,.2);border-radius:20px;
  font-size:11px;font-weight:700;color:#fff;
  backdrop-filter:blur(10px);
}
.home-avatar{
  width:50px;height:50px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.4);
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;overflow:hidden;flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  cursor:pointer;transition:transform .15s;
}
.home-avatar:active{transform:scale(.9)}
.home-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* Quote pill */
.quote-pill{
  background:#fff;border-radius:18px;
  padding:14px 16px;margin-bottom:16px;
  box-shadow:0 4px 20px rgba(108,53,222,.12);
  display:flex;align-items:flex-start;gap:10px;
  border-left:4px solid var(--p1);
}
.quote-star{font-size:18px;flex-shrink:0;margin-top:1px}
.quote-text{font-size:13px;font-weight:600;color:#3D2B7A;line-height:1.5}

/* Quick menu */
.quick-label{font-size:12px;font-weight:800;color:var(--p1);
  text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.qgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.qtile{
  border-radius:20px;padding:18px 10px 14px;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  box-shadow:0 6px 20px rgba(0,0,0,.15);
  transition:transform .15s cubic-bezier(.34,1.2,.64,1),box-shadow .15s;
  position:relative;overflow:hidden;cursor:pointer;
}
.qtile:active{transform:scale(.92);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.qtile::after{
  content:'';position:absolute;
  right:-12px;bottom:-12px;width:60px;height:60px;
  border-radius:50%;background:rgba(255,255,255,.15);
}
.qtile-icon{font-size:30px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
.qtile-label{font-size:12px;font-weight:800;color:#fff;
  letter-spacing:.1px;position:relative;z-index:1;text-align:center}
.qtile-badge{
  position:absolute;top:8px;right:8px;
  min-width:18px;height:18px;padding:0 4px;
  background:#fff;border-radius:9px;
  font-size:10px;font-weight:900;color:var(--c1);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
  opacity:0;transition:opacity .2s;
}
.qtile-badge.show{opacity:1}
.qt1{background:linear-gradient(145deg,#6C35DE,#9B59F5)}
.qt2{background:linear-gradient(145deg,#FF9500,#FFD60A)}
.qt3{background:linear-gradient(145deg,#FF3B5C,#FF6B9D)}
.qt4{background:linear-gradient(145deg,#34C759,#00C7BE)}
.qt5{background:linear-gradient(145deg,#BF5AF2,#FF375F)}
.qt6{background:linear-gradient(145deg,#0A84FF,#5AC8FA)}

/* Today section */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:16px;font-weight:800;color:#1A1040;letter-spacing:-.2px}
.section-link{font-size:13px;font-weight:600;color:var(--p1)}

.today-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(108,53,222,.1)}
.today-head{
  padding:12px 16px;
  background:linear-gradient(135deg,#34C759,#00C7BE);
  display:flex;align-items:center;gap:8px;
}
.today-head span{color:#fff;font-size:13px;font-weight:800}
.today-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;border-bottom:0.5px solid #F0EEFF;
}
.today-row:last-child{border-bottom:none}
.tr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tr-num{font-size:11px;font-weight:800;color:#8E8EA9;min-width:20px;text-align:center}
.tr-time{font-size:11px;color:#8E8EA9;font-weight:600;min-width:60px}
.tr-sub{font-size:14px;font-weight:700;flex:1;color:#1A1040}
.tr-icon{font-size:18px}

/* ═══════════════════════════════════════════
   TIMETABLE SCREEN
═══════════════════════════════════════════ */
.day-scroller{
  display:flex;gap:8px;overflow-x:auto;
  padding:4px 2px 10px;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.day-scroller::-webkit-scrollbar{display:none}
.day-chip{
  flex-shrink:0;width:58px;
  padding:10px 6px;border-radius:18px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.08);
  transition:all .22s cubic-bezier(.34,1.3,.64,1);
  cursor:pointer;
}
.day-chip .dc-day{font-size:10px;font-weight:700;color:#8E8EA9;text-transform:uppercase;letter-spacing:.5px}
.day-chip .dc-letter{font-size:22px;font-weight:900;color:#3D2B7A}
.day-chip.on{box-shadow:0 6px 20px rgba(108,53,222,.4);transform:translateY(-3px) scale(1.06)}
.day-chip[data-d="0"].on{background:linear-gradient(145deg,#6C35DE,#9B59F5)}
.day-chip[data-d="1"].on{background:linear-gradient(145deg,#FF3B5C,#FF9500)}
.day-chip[data-d="2"].on{background:linear-gradient(145deg,#0A84FF,#00C7BE)}
.day-chip[data-d="3"].on{background:linear-gradient(145deg,#34C759,#FFD60A)}
.day-chip[data-d="4"].on{background:linear-gradient(145deg,#BF5AF2,#FF375F)}
.day-chip.on .dc-day,.day-chip.on .dc-letter{color:#fff}
.day-chip.today-ring{box-shadow:0 0 0 2.5px var(--c1),0 3px 10px rgba(0,0,0,.08)}
.day-chip.on.today-ring{box-shadow:0 6px 20px rgba(108,53,222,.4)}

.period-block{
  border-radius:22px;margin-bottom:10px;overflow:hidden;
  box-shadow:0 6px 24px rgba(0,0,0,.15);
  animation:pAnim .35s cubic-bezier(.34,1.1,.64,1) both;
}
@keyframes pAnim{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.period-block:nth-child(1){animation-delay:.00s}
.period-block:nth-child(2){animation-delay:.05s}
.period-block:nth-child(3){animation-delay:.10s}
.period-block:nth-child(4){animation-delay:.15s}
.period-block:nth-child(5){animation-delay:.20s}
.period-block:nth-child(6){animation-delay:.25s}
.period-block:nth-child(7){animation-delay:.30s}
.period-block:nth-child(8){animation-delay:.35s}

.pb-inner{
  display:flex;align-items:center;gap:14px;
  padding:16px 18px;position:relative;overflow:hidden;
}
.pb-inner::before{
  content:'';position:absolute;
  right:-20px;top:50%;transform:translateY(-50%);
  width:90px;height:90px;border-radius:50%;
  background:rgba(255,255,255,.1);
}
.pb-inner::after{
  content:'';position:absolute;
  right:30px;top:-20px;
  width:50px;height:50px;border-radius:50%;
  background:rgba(255,255,255,.07);
}
.pb-num{
  width:44px;height:44px;border-radius:15px;flex-shrink:0;
  background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.35);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;color:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.3);
}
.pb-info{flex:1;min-width:0;position:relative;z-index:1}
.pb-subject{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pb-time{font-size:12px;color:rgba(255,255,255,.8);font-weight:600;margin-top:3px}
.pb-icon{font-size:30px;flex-shrink:0;position:relative;z-index:1;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.25))}
.pb-actions{display:flex;gap:6px;flex-shrink:0;position:relative;z-index:1}
.pb-btn{
  width:32px;height:32px;border-radius:10px;
  background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;transition:all .15s;
}
.pb-btn:active{background:rgba(255,255,255,.35);transform:scale(.88)}

/* ═══════════════════════════════════════════
   GRADES SCREEN
═══════════════════════════════════════════ */
.summary-card{
  border-radius:24px;padding:20px;margin-bottom:14px;
  background:linear-gradient(135deg,#6C35DE,#9B59F5);
  box-shadow:0 8px 30px rgba(108,53,222,.35);
  display:flex;align-items:center;gap:16px;
}
.sc-left{flex:1}
.sc-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.sc-grade{font-size:48px;font-weight:900;color:#fff;line-height:1;letter-spacing:-2px}
.sc-avg{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px;font-weight:600}
.sc-ring{
  width:72px;height:72px;border-radius:50%;flex-shrink:0;
  border:4px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;color:#fff;
}

.grade-list-card{background:#fff;border-radius:20px;overflow:hidden;
  box-shadow:0 4px 20px rgba(108,53,222,.1);}
.grade-item{display:flex;align-items:center;gap:14px;padding:14px 16px;
  border-bottom:0.5px solid #F0EEFF;}
.grade-item:last-child{border-bottom:none}
.gi-badge{
  width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.gi-info{flex:1;min-width:0}
.gi-name{font-size:14px;font-weight:800;color:#1A1040}
.gi-score{font-size:11px;color:#8E8EA9;margin-top:2px;font-weight:600}
.gi-bar{margin-top:6px;height:5px;background:#F0EEFF;border-radius:4px;overflow:hidden}
.gi-fill{height:100%;border-radius:4px;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.gi-letter{font-size:22px;font-weight:900;flex-shrink:0;min-width:32px;text-align:center}
.gi-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.act-sm{
  width:28px;height:28px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:all .15s;
}
.act-sm:active{transform:scale(.85)}
.a-edit{background:#EDE9FF;color:var(--p1)}
.a-del{background:#FFE4EE;color:var(--c1)}

/* ═══════════════════════════════════════════
   HOMEWORK SCREEN
═══════════════════════════════════════════ */
.status-strip{
  display:flex;gap:8px;overflow-x:auto;
  padding:2px 0 8px;scrollbar-width:none;
}
.status-strip::-webkit-scrollbar{display:none}
.sc{
  flex-shrink:0;padding:8px 18px;border-radius:20px;
  font-size:12px;font-weight:700;
  background:#fff;color:#8E8EA9;
  box-shadow:0 2px 8px rgba(0,0,0,.07);

.ph-wrap{position:relative;display:inline-block;width:90px;height:90px}

.ph-edit{

.field{margin-bottom:13px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:700;

.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;

  font-size:14px;color:#1A1040;background:#F8F6FF;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{

  background:#fff;outline:none;
}
.field textarea{resize:vertical;min-height:72px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ═══════════════════════════════════════════
   BOTTOM SHEETS
═══════════════════════════════════════════ */
.sheet-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(10,5,30,.5);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:none;align-items:flex-end;justify-content:center;
}
.sheet-overlay.open{display:flex;animation:shOvIn .2s ease}
@keyframes shOvIn{from{opacity:0}to{opacity:1}}
.sheet{

  border-radius:28px 28px 0 0;

}
@keyframes shIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:#E8E0FF;border-radius:4px;margin:14px auto 20px}
.sheet-title{font-size:18px;font-weight:900;color:#1A1040;margin-bottom:18px;letter-spacing:-.3px}
.sheet-btn-row{display:flex;gap:10px;margin-top:18px}

function goTab(i){
  const prev=curTab;
  document.querySelectorAll('.screen').forEach((s,idx)=>{

    if(idx===i){s.classList.add('active')}

  });
  document.querySelectorAll('.tab-item').forEach(b=>{
    b.classList.toggle('on', parseInt(b.dataset.tab)===i);
  });
  curTab=i;
  if(i===0) renderHome();
  if(i===1) renderTT();
  if(i===2) renderGrades();

  if(i===4) renderTodo();
}

function renderTT(){

  document.querySelectorAll('.day-chip').forEach(c=>{
    const d=parseInt(c.dataset.d);

    if(d===new Date().getDay()-1)c.classList.add('today-ring');
    if(d===ttDay)c.classList.add('on');

  ttDay=d;
  document.querySelectorAll('.day-chip').forEach(c=>c.classList.remove('on'));

}
function renderPeriods(){
  const tt=DB.get('timetable')||{};

  if(!list.length){
    el.innerHTML='<div class="empty-box"><div class="ei">📅</div><p>No periods yet. Tap + to add.</p></div>';return;
  }
  el.innerHTML=list.map((p,i)=>{
    const subj=p.s||p.subject;
    const time=p.t||p.time;
    const icon=p.i||p.icon||'📚';
    const grad=p.g||p.grad||GRADS[i%GRADS.length];
    return`<div class="period-block">

function editPeriod(i){
  const tt=DB.get('timetable')||{};
  const p=(tt[ttDay]||[])[i];if(!p)return;
  document.getElementById('sh-period-title').textContent='Edit Period';
  document.getElementById('sp-idx').value=i;
  document.getElementById('sp-day').value=ttDay;
  document.getElementById('sp-sub').value=p.s||p.subject;
  document.getElementById('sp-icon').value=p.i||p.icon||'';
  const tm=(p.t||p.time||'08:00–08:45').split('–');
  document.getElementById('sp-start').value=tm[0]?.trim().replace('.',':')||'08:00';
  document.getElementById('sp-end').value=tm[1]?.trim().replace('.',':')||'08:45';
  openSheet('sh-period');
}
function savePeriod(){
  const subj=document.getElementById('sp-sub').value.trim();
  if(!subj){toast('⚠️ Enter subject');return;}
  const start=document.getElementById('sp-start').value;
  const end=document.getElementById('sp-end').value;
  const icon=document.getElementById('sp-icon').value.trim()||ICONS[subj]||'📚';
  const d=parseInt(document.getElementById('sp-day').value||ttDay);
  const idx=parseInt(document.getElementById('sp-idx').value);
  const tt=DB.get('timetable')||{0:[],1:[],2:[],3:[],4:[]};
  if(!tt[d])tt[d]=[];
  const existGrad=idx>=0?(tt[d][idx]?.g||null):null;
  const entry={s:subj,t:`${start}–${end}`,i:icon,g:existGrad||GRADS[(idx>=0?idx:tt[d].length)%GRADS.length]};
  if(idx>=0)tt[d][idx]=entry;else tt[d].push(entry);
  DB.set('timetable',tt);
  closeSheet('sh-period');renderPeriods();
  toast('✅ Period saved!');
}
function delPeriod(i){
  if(!confirm('Remove this period?'))return;
  const tt=DB.get('timetable')||{};
  (tt[ttDay]||[]).splice(i,1);DB.set('timetable',tt);renderPeriods();toast('🗑 Removed');
}

const GBADGE_GRADS=[
  'linear-gradient(135deg,#667eea,#764ba2)',
  'linear-gradient(135deg,#f093fb,#f5576c)',

];
function gradeInfo(score,max){
  const pct=Math.round(score/max*100);
  if(pct>=90)return{l:'A+',c:'#34C759',fill:'#34C759'};
  if(pct>=80)return{l:'A', c:'#0A84FF',fill:'#0A84FF'};
  if(pct>=70)return{l:'B+',c:'#5AC8FA',fill:'#5AC8FA'};
  if(pct>=60)return{l:'B', c:'#FF9500',fill:'#FF9500'};
  if(pct>=50)return{l:'C', c:'#FF6B6B',fill:'#FF6B6B'};
  return{l:'D',c:'#FF3B5C',fill:'#FF3B5C'};
}
function renderGrades(){
  const grades=DB.get('grades')||[];
  const el=document.getElementById('grades-body');
  if(!grades.length){
    el.innerHTML='<div class="empty-box"><div class="ei">📊</div><p>No subjects yet. Tap + to add.</p></div>';return;
  }
  const avg=grades.reduce((a,g)=>a+g.score/g.max*100,0)/grades.length;
  const gi=gradeInfo(avg,100);
  el.innerHTML=`
    <div class="summary-card mb16">
      <div class="sc-left">
        <div class="sc-label">Overall Performance</div>
        <div class="sc-grade">${gi.l}</div>
        <div class="sc-avg">${Math.round(avg)}% · ${grades.length} subjects</div>
      </div>
      <div class="sc-ring">${gi.l}</div>
    </div>
    <div class="grade-list-card">
      ${grades.map((g,i)=>{
        const pct=Math.round(g.score/g.max*100);
        const info=gradeInfo(g.score,g.max);
        const subj=g.s||g.subject;
        return`<div class="grade-item">
          <div class="gi-badge" style="background:${GBADGE_GRADS[i%GBADGE_GRADS.length]}">${ICONS[subj]||'📚'}</div>
          <div class="gi-info">
            <div class="gi-name">${subj}</div>
            <div class="gi-score">${g.score}/${g.max} · ${pct}%</div>
            <div class="gi-bar"><div class="gi-fill" style="width:0%;background:${info.fill}" data-w="${pct}"></div></div>
          </div>
          <div class="gi-letter" style="color:${info.c}">${info.l}</div>
          <div class="gi-actions">
            <button class="act-sm a-edit" onclick="openGradeSheet(${i})">✏️</button>
            <button class="act-sm a-del"  onclick="delGrade(${i})">🗑</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  // Animate bars
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      document.querySelectorAll('.gi-fill').forEach(b=>{b.style.width=b.dataset.w+'%'});
    },100);
  });
}
function openGradeSheet(idx){
  document.getElementById('sg-idx').value=idx;
  if(idx>=0){
    const g=(DB.get('grades')||[])[idx];
    document.getElementById('sh-grade-title').textContent='Edit Subject';
    document.getElementById('sg-sub').value=g.s||g.subject;
    document.getElementById('sg-score').value=g.score;
    document.getElementById('sg-max').value=g.max;
  } else {
    document.getElementById('sh-grade-title').textContent='Add Subject';
    document.getElementById('sg-sub').value='';
    document.getElementById('sg-score').value='';
    document.getElementById('sg-max').value='100';
  }
  openSheet('sh-grade');
}
function saveGrade(){
  const subj=document.getElementById('sg-sub').value.trim();
  if(!subj){toast('⚠️ Enter subject');return;}
  const score=parseFloat(document.getElementById('sg-score').value)||0;
  const max=parseFloat(document.getElementById('sg-max').value)||100;
  const grades=DB.get('grades')||[];
  const idx=parseInt(document.getElementById('sg-idx').value);
  const entry={s:subj,score,max};
  if(idx>=0)grades[idx]=entry;else grades.push(entry);
  DB.set('grades',grades);
  closeSheet('sh-grade');renderGrades();badge('qb-g',grades.length);badge('tb-g',grades.length);
  toast('✅ Grade saved!');
}
function delGrade(i){
  if(!confirm('Delete subject?'))return;
  const grades=DB.get('grades')||[];
  grades.splice(i,1);DB.set('grades',grades);renderGrades();
  badge('qb-g',grades.length);badge('tb-g',grades.length);
  toast('🗑 Deleted');
}

          <button class="hw-del-btn" onclick="delHw(${ri})">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function advHw(i){
  const hw=DB.get('homework')||[];
  const st=HSTATUS[hw[i].status];
  if(st.next){hw[i].status=st.next;DB.set('homework',hw);renderHw();}
}
function delHw(i){
  const hw=DB.get('homework')||[];hw.splice(i,1);DB.set('homework',hw);renderHw();
  updateHwBadge();toast('🗑 Removed');
}
function resetHwSheet(){
  document.getElementById('mh-sub').value='';
  document.getElementById('mh-desc').value='';
  document.getElementById('mh-due').value=todayISO();
  document.getElementById('mh-status').value='pending';
}
function saveHw(){
  const sub=document.getElementById('mh-sub').value.trim();
  if(!sub){toast('⚠️ Enter subject');return;}
  const hw=DB.get('homework')||[];
  hw.unshift({subject:sub,desc:document.getElementById('mh-desc').value.trim(),
    due:document.getElementById('mh-due').value,status:document.getElementById('mh-status').value});
  DB.set('homework',hw);
  closeSheet('sh-hw');renderHw();updateHwBadge();toast('✅ Homework added!');
}
function setHwF(f,btn){
  hwFilter=f;
  document.querySelectorAll('#s-hw .sc').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');renderHw();
}
function updateHwBadge(){
  const n=(DB.get('homework')||[]).filter(h=>h.status!=='finished').length;
  badge('qb-hw',n);badge('tb-hw',n);
}

/* ════════════════════════════════════════════════
   TODO
════════════════════════════════════════════════ */
function renderTodo(){
  const all=DB.get('todos')||[];
  const list=todoFilter==='all'?all:all.filter(t=>todoFilter==='done'?t.done:!t.done);
  const el=document.getElementById('todo-body');
  if(!list.length){
    el.innerHTML='<div class="empty-box"><div class="ei">✅</div><p>'+(todoFilter==='all'?'No tasks. Tap + to add!':'Nothing here!')+'</p></div>';return;
  }
  el.innerHTML=list.map(t=>{
    const ri=all.indexOf(t);
    return`<div class="todo-block">
      <div class="todo-chk ${t.done?'done':''}" onclick="toggleTodo(${ri})">${t.done?'✓':''}</div>
      <div class="todo-info">
        <div class="todo-name ${t.done?'done':''}">${t.name}</div>
        ${t.desc?`<div class="todo-desc">${t.desc}</div>`:''}
        ${t.dead?`<div class="todo-dead">🗓 ${fmtDate(t.dead)}</div>`:''}
      </div>
      <button class="todo-del" onclick="delTodo(${ri})">✕</button>
    </div>`;
  }).join('');
}
function toggleTodo(i){
  const t=DB.get('todos')||[];t[i].done=!t[i].done;DB.set('todos',t);renderTodo();updateTodoBadge();
}
function delTodo(i){
  const t=DB.get('todos')||[];t.splice(i,1);DB.set('todos',t);renderTodo();updateTodoBadge();toast('🗑 Removed');
}
function resetTodoSheet(){
  document.getElementById('mt-name').value='';
  document.getElementById('mt-desc').value='';
  document.getElementById('mt-dead').value='';
}
function saveTodo(){
  const name=document.getElementById('mt-name').value.trim();
  if(!name){toast('⚠️ Enter task name');return;}
  const todos=DB.get('todos')||[];
  todos.unshift({name,desc:document.getElementById('mt-desc').value.trim(),
    dead:document.getElementById('mt-dead').value,done:false});
  DB.set('todos',todos);
  closeSheet('sh-todo');renderTodo();updateTodoBadge();toast('✅ Task added!');
}
function setTodoF(f,btn){
  todoFilter=f;
  document.querySelectorAll('#s-todo .sc').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');renderTodo();
}
function updateTodoBadge(){
  const n=(DB.get('todos')||[]).filter(t=>!t.done).length;
  badge('qb-td',n);badge('tb-td',n);
}

/* ════════════════════════════════════════════════
   SHEETS
════════════════════════════════════════════════ */
function openSheet(id){document.getElementById(id).classList.add('open')}
function closeSheet(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.sheet-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open')});
});

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);
}

/* ════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════ */
function todayISO(){return new Date().toISOString().split('T')[0]}
function fmtDate(d){
  if(!d)return'';
  try{return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
  catch{return d}
}

/* ════════════════════════════════════════════════
   SERVICE WORKER
════════════════════════════════════════════════ */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(r=>{r.update();console.log('SW ready')})
      .catch(()=>{});
  });
}

/* ════════════════════════════════════════════════
   INIT — splash then boot
════════════════════════════════════════════════ */
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>document.getElementById('splash').remove(),500);
  }, 1800);
  renderHome();
});
</script>
