<title>Rishan</title>
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FOUNDATION
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*,*::before,*::after{
  box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  user-select:none;
}
html{height:100%;overflow:hidden;-webkit-text-size-adjust:100%}
body{
  height:100%;overflow:hidden;position:fixed;width:100%;
  font-family:-apple-system,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
  background:#F0F8F8;
  overscroll-behavior:none;
}
button,input,select,textarea{font-family:inherit;border:none;outline:none;background:none}
img{display:block;max-width:100%}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DESIGN TOKENS  —  Warm Teal + Coral palette
   Calm, readable, yet cheerful and vibrant
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root{
  /* ── Brand core: deep teal ── */
  --navy:#063D3D;       /* darkest – hero bg start   */
  --violet:#0D6E6E;     /* primary brand colour       */
  --purple:#138D8D;     /* slightly lighter primary   */
  --plum:#1AADAD;       /* accent / highlights        */
  --lilac:#A7DADA;      /* soft tint for borders      */
  --lavender:#E0F4F4;   /* very light bg tint         */

  /* ── Readable text & surfaces ── */
  --ink:#0F2A2A;
  --ink2:#2C4A4A;
  --ink3:#5C7C7C;
  --ink4:#8FAAAA;
  --surface:#FFFFFF;
  --bg:#F0F8F8;          /* warm white-teal page bg   */
  --bg2:#DFF0F0;         /* secondary bg panels       */
  --line:rgba(13,110,110,.10);

  /* ── Accent pops ── */
  --coral:#FF6F5E;       /* warm coral – CTA, badges  */
  --orange:#FF9A3C;      /* sunny amber-orange         */
  --amber:#F5B800;       /* golden yellow              */
  --green:#27AE60;       /* success green              */
  --teal:#0D6E6E;        /* same as brand primary      */
  --rose:#E8445A;        /* error / delete red         */

  /* ── Gradients ── */
  /* Hero header: deep teal to warm teal */
  --g-hero:linear-gradient(150deg,#063D3D 0%,#0D6E6E 55%,#138D8D 100%);
  /* Primary card / button gradient */
  --g-card-p:linear-gradient(135deg,#0D6E6E,#1AADAD);
  /* Tile gradients – each menu tile a distinct mood */
  --g-coral:linear-gradient(135deg,#FF6F5E,#FF9A3C);   /* Profile   */
  --g-teal:linear-gradient(135deg,#F5B800,#F5D800);    /* Timetable */
  --g-rose:linear-gradient(135deg,#E8445A,#FF7B54);    /* Grades    */
  --g-plum:linear-gradient(135deg,#27AE60,#2ECC8A);    /* Homework  */
  --g-amber:linear-gradient(135deg,#8B5CF6,#C084FC);   /* To Do     */

  /* ── Timetable period card gradients (vivid, distinct) ── */
  --tt0:linear-gradient(145deg,#0D6E6E,#1AADAD);   /* teal        */
  --tt1:linear-gradient(145deg,#FF6F5E,#FF9A3C);   /* coral       */
  --tt2:linear-gradient(145deg,#F5B800,#F5D800);   /* golden      */
  --tt3:linear-gradient(145deg,#27AE60,#2ECC8A);   /* green       */
  --tt4:linear-gradient(145deg,#8B5CF6,#C084FC);   /* violet      */
  --tt5:linear-gradient(145deg,#E8445A,#FF7B54);   /* rose-orange */
  --tt6:linear-gradient(145deg,#0EA5E9,#38BDF8);   /* sky         */
  --tt7:linear-gradient(145deg,#D97706,#FBBF24);   /* amber-warm  */

  /* ── Elevation ── */
  --e1:0 1px 3px rgba(13,110,110,.08),0 1px 2px rgba(0,0,0,.04);
  --e2:0 4px 12px rgba(13,110,110,.12),0 2px 4px rgba(0,0,0,.05);
  --e3:0 8px 24px rgba(13,110,110,.14),0 3px 8px rgba(0,0,0,.06);
  --e-purple:0 6px 20px rgba(13,110,110,.32);   /* named legacy, now teal shadow */
  --e-colored:0 6px 20px rgba(0,0,0,.16);

  /* ── Radii ── */
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;--r28:28px;

  /* ── Safe areas ── */
  --sat:env(safe-area-inset-top,44px);
  --sab:env(safe-area-inset-bottom,34px);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   APP SHELL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SPLASH
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:var(--g-hero);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .55s ease,transform .55s ease;
}
#splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.sp-icon{
  width:96px;height:96px;border-radius:24px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.20);
  backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:center;font-size:50px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  animation:spPop .7s cubic-bezier(.34,1.56,.64,1) .1s both;
}
@keyframes spPop{from{opacity:0;transform:scale(.3) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.sp-name{
  font-size:28px;font-weight:700;color:#fff;
  letter-spacing:-.5px;margin-top:20px;
  animation:spUp .5s ease .4s both;
}
.sp-sub{
  font-size:13px;color:rgba(255,255,255,.55);
  margin-top:6px;font-weight:400;
  animation:spUp .5s ease .5s both;
}
@keyframes spUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sp-bar{
  width:48px;height:3px;border-radius:2px;
  background:rgba(255,255,255,.25);
  margin-top:52px;overflow:hidden;
  animation:spUp .4s ease .7s both;
}
.sp-bar-fill{
  height:100%;width:0;border-radius:2px;
  background:rgba(255,255,255,.7);
  animation:spFill 1.5s ease .8s both;
}
@keyframes spFill{from{width:0}to{width:100%}}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SCREENS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#status-bar{flex-shrink:0;height:var(--sat)}
#screens{flex:1;overflow:hidden;position:relative}

.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transform:translateX(28px) scale(.98);
  transition:opacity .26s ease,transform .26s cubic-bezier(.25,.46,.45,.94);
  background:var(--bg);
}
.screen.active{opacity:1;pointer-events:all;transform:translateX(0) scale(1)}
.screen.slide-left{transform:translateX(-28px) scale(.98)}

.scr-body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:16px 16px 40px;
  max-width:680px;margin:0 auto;width:100%;
}

/* sub-screens */
.sub-screen{
  position:absolute;inset:0;display:flex;flex-direction:column;
  background:var(--bg);
  transform:translateX(100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  z-index:10;
}
.sub-screen.open{transform:translateX(0)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOP BAR (inner screens)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.top-bar{
  flex-shrink:0;
  height:52px;
  display:flex;align-items:center;gap:12px;
  padding:0 16px;
  background:var(--surface);
  border-bottom:1px solid var(--line);
}
.top-bar-back{
  width:32px;height:32px;border-radius:50%;
  background:var(--lavender);
  display:flex;align-items:center;justify-content:center;
  color:var(--navy);font-size:18px;
  transition:opacity .15s,transform .12s;flex-shrink:0;
}
.top-bar-back:active{opacity:.6;transform:scale(.88)}
.top-bar-title{
  flex:1;text-align:center;
  font-size:16px;font-weight:700;color:var(--ink);
  letter-spacing:-.2px;
}
.top-bar-action{
  width:32px;height:32px;border-radius:50%;
  background:var(--g-card-p);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:19px;font-weight:600;
  box-shadow:var(--e-purple);
  transition:transform .12s,opacity .12s;flex-shrink:0;
}
.top-bar-action:active{transform:scale(.88);opacity:.85}
.top-bar-spacer{width:32px;flex-shrink:0}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOME — HERO HEADER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.hero{
  background:var(--g-hero);
  border-radius:0 0 var(--r28) var(--r28);
  padding:20px 20px 28px;
  margin:-16px -16px 24px;
  position:relative;overflow:hidden;
  box-shadow:var(--e-purple);
}
.hero::before{
  content:'';position:absolute;
  width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,.05);
  right:-60px;top:-60px;
}
.hero::after{
  content:'';position:absolute;
  width:140px;height:140px;border-radius:50%;
  background:rgba(255,255,255,.04);
  left:-30px;bottom:-50px;
}
.hero-row{display:flex;align-items:flex-start;gap:14px;position:relative;z-index:1}
.hero-left{flex:1;min-width:0}
.hero-greeting{
  font-size:11px;color:rgba(255,255,255,.55);
  font-weight:500;letter-spacing:.6px;text-transform:uppercase;
  margin-bottom:4px;
}
.hero-name{
  font-size:24px;font-weight:700;color:#fff;
  letter-spacing:-.4px;line-height:1.15;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hero-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.hero-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;
  background:rgba(255,255,255,.14);
  font-size:11px;font-weight:600;color:rgba(255,255,255,.9);
  letter-spacing:.1px;
}
.hero-avatar{
  width:46px;height:46px;border-radius:50%;
  border:2px solid rgba(255,255,255,.30);
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;overflow:hidden;flex-shrink:0;
  cursor:pointer;transition:transform .14s,opacity .14s;
}
.hero-avatar:active{transform:scale(.88);opacity:.8}
.hero-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   QUOTE STRIP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.quote-strip{
  background:var(--surface);
  border-radius:var(--r16);
  padding:14px 16px;
  margin-bottom:24px;
  box-shadow:var(--e1);
  display:flex;align-items:flex-start;gap:10px;
  border-left:3px solid var(--violet);
}
.qs-icon{font-size:15px;margin-top:1px;flex-shrink:0}
.qs-text{font-size:13px;color:var(--ink2);line-height:1.6;font-style:italic}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SECTION HEADING
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.sec-label{
  font-size:12px;font-weight:700;
  color:var(--ink);letter-spacing:.2px;
}
.sec-link{
  font-size:12px;font-weight:600;color:var(--navy);
  padding:4px 10px;border-radius:20px;
  background:var(--lavender);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MENU GRID — 3 × 2
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.mgrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:24px;
}
.mtile{
  border-radius:var(--r20);
  padding:16px 12px 14px;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;gap:7px;
  box-shadow:var(--e-colored);
  transition:transform .16s cubic-bezier(.34,1.2,.64,1),opacity .12s;
  position:relative;overflow:hidden;cursor:pointer;
}
.mtile:active{transform:scale(.91);opacity:.88}
.mtile::after{
  content:'';position:absolute;
  right:-14px;bottom:-14px;width:60px;height:60px;
  border-radius:50%;background:rgba(255,255,255,.12);
}
.mt-icon{font-size:26px;line-height:1;position:relative;z-index:1}
.mt-label{
  font-size:11px;font-weight:700;color:#fff;
  letter-spacing:.1px;position:relative;z-index:1;
}
.mt-badge{
  position:absolute;top:8px;right:8px;
  min-width:17px;height:17px;padding:0 4px;
  border-radius:10px;font-size:9px;font-weight:800;
  background:#fff;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .18s;z-index:2;
}
.mt-badge.show{opacity:1}
/* Tile colours — each tile its own vivid gradient */
.mt-a{background:var(--g-coral);}  .mt-a .mt-badge{color:var(--coral)}   /* Profile   */
.mt-b{background:var(--g-teal);}   .mt-b .mt-badge{color:#A07800}         /* Timetable */
.mt-c{background:var(--g-rose);}   .mt-c .mt-badge{color:var(--rose)}    /* Grades    */
.mt-d{background:var(--g-plum);}   .mt-d .mt-badge{color:var(--green)}   /* Homework  */
.mt-e{background:var(--g-amber);}  .mt-e .mt-badge{color:#5B21B6}        /* To Do     */
.mt-f{background:var(--g-card-p);} .mt-f .mt-badge{color:var(--violet)}  /* Today     */

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TODAY CARD
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.today-card{
  background:var(--surface);
  border-radius:var(--r20);
  overflow:hidden;
  box-shadow:var(--e2);
}
.today-head{
  padding:13px 16px;
  background:linear-gradient(90deg,#ECFDF5,rgba(236,253,245,0));
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.today-head-lbl{font-size:13px;font-weight:700;color:#065F46}
.today-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;border-bottom:1px solid rgba(0,0,0,.05);
}
.today-row:last-child{border-bottom:none}
.tr-num{
  width:24px;height:24px;border-radius:8px;
  background:var(--lavender);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:var(--navy);flex-shrink:0;
}
.tr-time{font-size:11px;color:var(--ink3);font-weight:600;min-width:58px;flex-shrink:0}
.tr-sub{font-size:14px;font-weight:600;color:var(--ink);flex:1}
.tr-ico{font-size:18px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TIMETABLE SCREEN
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.day-strip{
  display:flex;gap:6px;overflow-x:auto;
  padding:12px 16px 10px;
  background:var(--surface);
  border-bottom:1px solid var(--line);
  scrollbar-width:none;flex-shrink:0;
}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{
  flex-shrink:0;padding:8px 18px;border-radius:20px;
  font-size:13px;font-weight:600;color:var(--ink3);
  background:var(--bg2);
  transition:all .22s cubic-bezier(.34,1.15,.64,1);
}
.day-btn:active{transform:scale(.93)}
.day-btn.on{
  background:var(--g-card-p);color:#fff;
  box-shadow:var(--e-purple);
  transform:scale(1.04);
}
.day-btn.today-ring{outline:2px solid var(--coral);outline-offset:1px}
.day-btn.on.today-ring{outline:none}

.tt-wrap{
  flex:1;padding:12px 16px;overflow:hidden;
  display:flex;flex-direction:column;
}
.tt-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:repeat(4,1fr);
  gap:10px;
  flex:1;
}

/* timetable period card */
.tt-card{
  border-radius:var(--r20);overflow:hidden;
  box-shadow:var(--e-colored);
  display:flex;flex-direction:column;
  animation:ttIn .3s cubic-bezier(.34,1.1,.64,1) both;
}
@keyframes ttIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.tt-card:nth-child(1){animation-delay:.02s}.tt-card:nth-child(2){animation-delay:.05s}
.tt-card:nth-child(3){animation-delay:.08s}.tt-card:nth-child(4){animation-delay:.11s}
.tt-card:nth-child(5){animation-delay:.14s}.tt-card:nth-child(6){animation-delay:.17s}
.tt-card:nth-child(7){animation-delay:.20s}.tt-card:nth-child(8){animation-delay:.23s}

.tt-body{
  flex:1;padding:12px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;
}
.tt-body::before{
  content:'';position:absolute;right:-16px;top:-16px;
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,255,255,.10);pointer-events:none;
}
.tt-num{
  width:26px;height:26px;border-radius:8px;
  background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.28);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;
  margin-bottom:8px;
}
.tt-subj{
  font-size:13px;font-weight:700;color:#fff;
  line-height:1.25;letter-spacing:-.1px;
  text-shadow:0 1px 3px rgba(0,0,0,.15);
}
.tt-time{
  font-size:10px;color:rgba(255,255,255,.75);
  font-weight:600;margin-top:4px;
}
.tt-ico{
  position:absolute;right:10px;bottom:8px;
  font-size:24px;opacity:.9;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.20));
}
.tt-actions{
  display:flex;gap:4px;padding:5px 8px;
  background:rgba(0,0,0,.15);
  justify-content:flex-end;flex-shrink:0;
}
.tt-act{
  width:24px;height:24px;border-radius:6px;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.22);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;
  transition:background .12s;
}
.tt-act:active{background:rgba(255,255,255,.35);transform:scale(.85)}

/* gradient classes */
.g0{background:var(--tt0)}.g1{background:var(--tt1)}.g2{background:var(--tt2)}
.g3{background:var(--tt3)}.g4{background:var(--tt4)}.g5{background:var(--tt5)}
.g6{background:var(--tt6)}.g7{background:var(--tt7)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   GRADES SCREEN
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.grade-banner{
  background:var(--g-card-p);
  border-radius:var(--r20);padding:20px;
  margin-bottom:16px;box-shadow:var(--e-purple);
  display:flex;align-items:center;gap:16px;
}
.gb-left{flex:1}
.gb-eyebrow{
  font-size:10px;font-weight:700;
  color:rgba(255,255,255,.6);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;
}
.gb-grade{font-size:44px;font-weight:800;color:#fff;line-height:1;letter-spacing:-2px}
.gb-sub{font-size:13px;color:rgba(255,255,255,.65);margin-top:5px;font-weight:500}
.gb-ring{
  width:68px;height:68px;border-radius:50%;flex-shrink:0;
  border:2.5px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:800;color:#fff;
}

.grade-list{
  background:var(--surface);border-radius:var(--r20);
  overflow:hidden;box-shadow:var(--e2);
}
.grade-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-bottom:1px solid var(--line);
}
.grade-row:last-child{border-bottom:none}
.gr-icon{
  width:42px;height:42px;border-radius:var(--r12);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.gr-body{flex:1;min-width:0}
.gr-name{font-size:14px;font-weight:600;color:var(--ink)}
.gr-meta{font-size:11px;color:var(--ink3);margin-top:2px;font-weight:500}
.gr-bar{margin-top:7px;height:4px;background:var(--bg2);border-radius:4px;overflow:hidden}
.gr-fill{height:100%;border-radius:4px;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.gr-letter{font-size:20px;font-weight:800;flex-shrink:0;min-width:28px;text-align:right}
.gr-acts{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.act-ico{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:opacity .12s,transform .1s;
}
.act-ico:active{opacity:.65;transform:scale(.84)}
.act-e{background:var(--lavender);color:var(--navy)}
.act-d{background:#FEF2F2;color:#EF4444}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FILTER CHIPS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.chips{
  display:flex;gap:7px;overflow-x:auto;
  padding:0 0 14px;scrollbar-width:none;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:8px 16px;border-radius:20px;
  font-size:12px;font-weight:600;color:var(--ink3);
  background:var(--surface);box-shadow:var(--e1);
  transition:all .18s;
}
.chip.on{
  background:var(--g-card-p);color:#fff;
  box-shadow:var(--e-purple);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOMEWORK CARDS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.hw-card{
  background:var(--surface);border-radius:var(--r16);
  margin-bottom:10px;overflow:hidden;box-shadow:var(--e2);
}
.hw-stripe{height:3px}
.hw-inner{padding:14px 16px}
.hw-top{display:flex;align-items:flex-start;gap:10px}
.hw-subj{font-size:15px;font-weight:700;color:var(--ink);flex:1;line-height:1.25}
.hw-pill{
  padding:4px 9px;border-radius:20px;
  font-size:10px;font-weight:700;flex-shrink:0;white-space:nowrap;
}
.hw-desc{font-size:13px;color:var(--ink2);margin-top:7px;line-height:1.55}
.hw-foot{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.hw-due{font-size:11px;font-weight:600;color:var(--ink3)}
.hw-next-btn{
  padding:5px 13px;border-radius:16px;
  font-size:11px;font-weight:700;cursor:pointer;
  border:none;font-family:inherit;transition:opacity .12s;
}
.hw-next-btn:active{opacity:.7}
.hw-del-btn{
  margin-left:auto;font-size:12px;font-weight:600;
  color:var(--ink3);background:var(--bg2);
  padding:5px 11px;border-radius:12px;cursor:pointer;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TODO CARDS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.todo-card{
  background:var(--surface);border-radius:var(--r16);
  padding:14px 16px;margin-bottom:10px;box-shadow:var(--e2);
  display:flex;align-items:flex-start;gap:12px;
}
.todo-chk{
  width:22px;height:22px;border-radius:7px;
  border:2px solid var(--bg2);background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;margin-top:1px;transition:all .2s;cursor:pointer;flex-shrink:0;
}
.todo-chk.done{
  background:var(--green);border-color:var(--green);color:#fff;
  box-shadow:0 3px 10px rgba(16,185,129,.3);
}
.todo-body{flex:1;min-width:0}
.todo-name{font-size:14px;font-weight:600;color:var(--ink)}
.todo-name.done{text-decoration:line-through;color:var(--ink3)}
.todo-desc{font-size:12px;color:var(--ink3);margin-top:3px;line-height:1.45}
.todo-dead{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:7px;padding:3px 9px;border-radius:9px;
  background:var(--lavender);font-size:11px;font-weight:600;color:var(--navy);
}
.todo-del{font-size:16px;color:var(--bg2);cursor:pointer;padding:2px;flex-shrink:0}
.todo-del:active{color:#EF4444}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PROFILE SUB-SCREEN
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.profile-hero{
  background:var(--g-hero);
  border-radius:0 0 var(--r28) var(--r28);
  padding:22px 20px 28px;
  margin:-16px -16px 20px;
  text-align:center;position:relative;overflow:hidden;
  box-shadow:var(--e-purple);
}
.profile-hero::before{
  content:'';position:absolute;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,.06);
  right:-50px;top:-50px;
}
.p-pic-wrap{position:relative;display:inline-block;cursor:pointer}
.p-pic{
  width:86px;height:86px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
}
.p-pic img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.p-cam{
  position:absolute;right:-2px;bottom:0;
  width:28px;height:28px;border-radius:50%;
  background:var(--amber);border:2.5px solid var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
}
.p-name{font-size:19px;font-weight:700;color:#fff;margin-top:12px;letter-spacing:-.3px}
.p-school{font-size:12px;color:rgba(255,255,255,.6);margin-top:3px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FORMS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.form-card{
  background:var(--surface);border-radius:var(--r20);
  padding:18px;box-shadow:var(--e2);margin-bottom:12px;
}
.form-section{
  font-size:10px;font-weight:700;color:var(--violet);
  text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;
}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{
  display:block;font-size:12px;font-weight:600;
  color:var(--ink2);margin-bottom:5px;
}
.field input,.field select,.field textarea{
  width:100%;padding:11px 13px;
  border:1.5px solid var(--bg2);border-radius:var(--r12);
  font-size:14px;color:var(--ink);background:var(--bg);
  transition:border-color .18s,box-shadow .18s;
  -webkit-appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--violet);
  box-shadow:0 0 0 3px rgba(13,110,110,.12);
  background:var(--surface);outline:none;
}
.field textarea{resize:vertical;min-height:70px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BOTTOM SHEET
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sheet-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(10,8,20,.50);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:flex-end;justify-content:center;
}
.sheet-overlay.open{display:flex;animation:shOv .2s ease}
@keyframes shOv{from{opacity:0}to{opacity:1}}
.sheet{
  background:var(--surface);width:100%;max-width:560px;
  border-radius:var(--r28) var(--r28) 0 0;
  padding:0 20px calc(24px + var(--sab));
  max-height:90dvh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  animation:shUp .3s cubic-bezier(.34,1.05,.64,1);
}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{
  width:34px;height:4px;background:var(--bg2);
  border-radius:4px;margin:14px auto 20px;
}
.sh-title{
  font-size:17px;font-weight:700;color:var(--ink);
  margin-bottom:18px;letter-spacing:-.2px;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BUTTONS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.btn{
  padding:13px 20px;border-radius:var(--r16);
  font-size:14px;font-weight:700;font-family:inherit;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .1s,opacity .1s;cursor:pointer;
  letter-spacing:-.1px;
}
.btn:active{transform:scale(.95);opacity:.88}
.btn-primary{background:var(--g-card-p);color:#fff;box-shadow:var(--e-purple)}
.btn-ghost{background:var(--lavender);color:var(--violet)}
.btn-row{display:flex;gap:10px;margin-top:18px}
.btn-row .btn{flex:1}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOAST
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(17,24,39,.92);color:#fff;
  padding:11px 22px;border-radius:40px;
  font-size:13px;font-weight:600;white-space:nowrap;
  opacity:0;transition:opacity .28s,transform .28s;
  z-index:999;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.22);
  backdrop-filter:blur(8px);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   EMPTY STATE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.empty-box{text-align:center;padding:48px 20px}
.empty-box .ei{
  font-size:52px;display:block;margin-bottom:14px;
  animation:flt 3s ease-in-out infinite;
}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.empty-box p{font-size:14px;color:var(--ink3);font-weight:500}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

@media(min-width:680px){

  .tt-grid{grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr)}
}
</style>

<script>
/* ════════════════════════════════════════════════
   STORAGE
════════════════════════════════════════════════ */
const DB={
  get(k){try{return JSON.parse(localStorage.getItem('rs_'+k))}catch{return null}},
  set(k,v){localStorage.setItem('rs_'+k,JSON.stringify(v))},
  def(k,v){if(DB.get(k)===null)DB.set(k,v)}
};

/* ════════════════════════════════════════════════
   TIMETABLE GRADIENTS (8 per day, no breaks)
════════════════════════════════════════════════ */
const GRADS=[
  'linear-gradient(135deg,#667eea,#764ba2)',
  'linear-gradient(135deg,#f093fb,#f5576c)',
  'linear-gradient(135deg,#4facfe,#00f2fe)',
  'linear-gradient(135deg,#43e97b,#38f9d7)',
  'linear-gradient(135deg,#fa709a,#fee140)',
  'linear-gradient(135deg,#a18cd1,#fbc2eb)',
  'linear-gradient(135deg,#fccb90,#d57eeb)',
  'linear-gradient(135deg,#89f7fe,#66a6ff)',
];

const ICONS={
  'English':'📖','Mathematics':'🔢','Hindi':'🇮🇳','Science':'🔬',
  'Environmental Science':'🌿','Computer Science':'💻','Computer':'💻',
  'Art & Craft':'🎨','Art':'🎨','Physical Education':'⚽','P.E.':'⚽',
  'Music':'🎵','Library':'📚','Moral Science':'🌟','Social Studies':'🌍',
  'Drawing':'✏️','GK':'🧠','Urdu':'📜'
};

// Seed default timetable ONLY if not already saved by user
DB.def('timetable',{
  0:[
    {s:'English',           t:'7:45–8:30',  i:'📖', g:GRADS[0]},
    {s:'Mathematics',       t:'8:30–9:15',  i:'🔢', g:GRADS[1]},
    {s:'Environmental Science',t:'9:15–10:00',i:'🌿',g:GRADS[2]},
    {s:'Hindi',             t:'10:30–11:15',i:'🇮🇳',g:GRADS[3]},
    {s:'Art & Craft',       t:'11:15–12:00',i:'🎨', g:GRADS[4]},
    {s:'Physical Education',t:'12:00–12:45',i:'⚽', g:GRADS[5]},
    {s:'Computer Science',  t:'13:15–14:00',i:'💻', g:GRADS[6]},
    {s:'Library',           t:'14:00–14:45',i:'📚', g:GRADS[7]},
  ],

  const entry={s:subj,t:`${start}–${end}`,i:icon,g:existGrad||GRADS[(idx>=0?idx:tt[d].length)%GRADS.length]};

const GBADGE_GRADS=['g0','g1','g2','g3','g4'];
function gradeInfo(score,max){
  const pct=Math.round(score/max*100);
  if(pct>=90)return{l:'A+',c:'#10B981',fill:'#10B981'};
  if(pct>=80)return{l:'A', c:'#0A84FF',fill:'#0A84FF'};
  if(pct>=70)return{l:'B+',c:'#0EA5E9',fill:'#0EA5E9'};
  if(pct>=60)return{l:'B', c:'#F59E0B',fill:'#F59E0B'};
  if(pct>=50)return{l:'C', c:'#F97316',fill:'#F97316'};
  return{l:'D',c:'#EF4444',fill:'#EF4444'};
}
function renderGrades(){
  const grades=DB.get('grades')||[];
  const el=document.getElementById('grades-body');
  if(!grades.length){
    el.innerHTML='<div class="empty-box"><span class="ei">📊</span><p>No subjects yet. Tap + to add.</p></div>';return;
  }
  const avg=grades.reduce((a,g)=>a+g.score/g.max*100,0)/grades.length;
  const gi=gradeInfo(avg,100);
  el.innerHTML=`
    <div class="grade-banner">
      <div class="gb-left">
        <div class="gb-eyebrow">Overall Performance</div>
        <div class="gb-grade">${gi.l}</div>
        <div class="gb-sub">${Math.round(avg)}% average · ${grades.length} subjects</div>
      </div>
      <div class="gb-ring">${gi.l}</div>
    </div>
    <div class="grade-list">
      ${grades.map((g,i)=>{
        const pct=Math.round(g.score/g.max*100);
        const info=gradeInfo(g.score,g.max);
        const subj=g.s||g.subject;
        return`<div class="grade-row">
          <div class="gr-icon ${GBADGE_GRADS[i%GBADGE_GRADS.length]}">${ICONS[subj]||'📚'}</div>
          <div class="gr-body">
            <div class="gr-name">${subj}</div>
            <div class="gr-meta">${g.score}/${g.max} · ${pct}%</div>
            <div class="gr-bar"><div class="gr-fill" style="width:0%;background:${info.fill}" data-w="${pct}"></div></div>
          </div>
          <div class="gr-letter" style="color:${info.c}">${info.l}</div>
          <div class="gr-acts">
            <button class="act-ico act-e" onclick="openGradeSheet(${i})">✏️</button>
            <button class="act-ico act-d" onclick="delGrade(${i})">🗑</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      document.querySelectorAll('.gr-fill').forEach(b=>{b.style.width=b.dataset.w+'%'});
    },100);
  });
}
function openGradeSheet(idx){
  document.getElementById('sg-idx').value=idx;
  if(idx>=0){
    const g=(DB.get('grades')||[])[idx];
    document.getElementById('sh-grade-title').textContent='Edit Subject';
    document.getElementById('sg-sub').value=g.s||g.subject;
    document.getElementById('sg-score').value=g.score;
    document.getElementById('sg-max').value=g.max;
  } else {
    document.getElementById('sh-grade-title').textContent='Add Subject';
    document.getElementById('sg-sub').value='';
    document.getElementById('sg-score').value='';
    document.getElementById('sg-max').value='100';
  }
  openSheet('sh-grade');
}
function saveGrade(){
  const subj=document.getElementById('sg-sub').value.trim();
  if(!subj){toast('⚠️ Enter subject');return;}
  const score=parseFloat(document.getElementById('sg-score').value)||0;
  const max=parseFloat(document.getElementById('sg-max').value)||100;
  const grades=DB.get('grades')||[];
  const idx=parseInt(document.getElementById('sg-idx').value);
  const entry={s:subj,score,max};
  if(idx>=0)grades[idx]=entry;else grades.push(entry);

  if(!confirm('Delete subject?'))return;

}
function delTodo(i){
  const t=DB.get('todos')||[];t.splice(i,1);DB.set('todos',t);renderTodo();updateTodoBadge();toast('🗑 Removed');
}
function resetTodoSheet(){
  document.getElementById('mt-name').value='';
  document.getElementById('mt-desc').value='';
  document.getElementById('mt-dead').value='';
}
function saveTodo(){
  const name=document.getElementById('mt-name').value.trim();
  if(!name){toast('⚠️ Enter task name');return;}
  const todos=DB.get('todos')||[];
  todos.unshift({name,desc:document.getElementById('mt-desc').value.trim(),
    dead:document.getElementById('mt-dead').value,done:false});
  DB.set('todos',todos);
  closeSheet('sh-todo');renderTodo();updateTodoBadge();toast('✅ Task added!');
}
function setTodoF(f,btn){
  todoFilter=f;
  document.querySelectorAll('#s-todo .chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');renderTodo();
}
function updateTodoBadge(){
  const n=(DB.get('todos')||[]).filter(t=>!t.done).length;
  badge('qb-td',n);
}

let _tt;

function todayISO(){return new Date().toISOString().split('T')[0]}
function fmtDate(d){
  if(!d)return'';
  try{return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
  catch{return d}
}

/* ════════════════════════════════════════════════
   ANDROID HARDWARE BACK BUTTON
════════════════════════════════════════════════ */
// Push a history state so the back gesture has something to pop
window.addEventListener('load', () => {
  history.pushState({ screen: 'home' }, '');
});
window.addEventListener('popstate', (e) => {
  // If a sheet is open, close it first
  const openSheet = document.querySelector('.sheet-overlay.open');
  if (openSheet) { openSheet.classList.remove('open'); history.pushState({screen:'sheet-closed'},''); return; }
  // If a sub-screen is open, close it
  const openSub = document.querySelector('.sub-screen.open');
  if (openSub) { openSub.classList.remove('open'); history.pushState({screen:'sub-closed'},''); return; }
  // If on a section screen (not home), go back to home
  if (curTab !== 0) { goTab(0); history.pushState({ screen: 'home' }, ''); return; }
  // Already on home — let the OS handle it (minimize)
});

/* ════════════════════════════════════════════════
   SERVICE WORKER
════════════════════════════════════════════════ */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        // Tell any waiting SW to activate immediately
        if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
        reg.addEventListener('updatefound', () => {
          const sw = reg.installing;
          sw.addEventListener('statechange', () => {
            if (sw.state === 'installed' && navigator.serviceWorker.controller) {
              sw.postMessage('SKIP_WAITING');
            }
          });
        });
      })
      .catch(()=>{});
  });
}
